version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: pm_system_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pm_system
      POSTGRES_USER: pm_user
      POSTGRES_PASSWORD: pm_pass_change_me
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm_user -d pm_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_system_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pm_user:pm_pass_change_me@db:5432/pm_system
      NEXTAUTH_SECRET: change-this-secret-in-production-min-32-chars
      NEXTAUTH_URL: http://localhost:3000
      UPLOAD_DIR: public/uploads
      NODE_ENV: production
    volumes:
      - ./public/uploads:/app/public/uploads  # Persist uploaded photos
    depends_on:
      db:
        condition: service_healthy

  # Optional: Adminer for DB management
  adminer:
    image: adminer
    container_name: pm_system_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  pgdata:
